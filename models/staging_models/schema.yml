version: 2 
models:
  - name: stg_albums
    columns:
      - name: album_id
        tests:
          - unique
          - not_null

      - name: artist_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_artists')
              field: artist_id

      - name: album_name
        tests: 
          - not_null
      - name: release_year
        tests:
          - not_null


  - name: stg_artists
    columns: 
      - name: artist_id
        tests:
          - not_null
          - unique
      - name: artist_name
        tests:
          - not_null
      - name: primary_genre
        tests: 
          - not_null 
          - accepted_values:
              values: ['indie', 'edm', 'rock', 'hip_hop', 'rnb', 'latin', 'afrobeats', 'pop']
      - name: artist_country
        tests: 
          - not_null 

  - name: stg_tracks
    columns:
      - name: track_id
        tests:
          - not_null
          - unique
      - name: album_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_albums')
              field: album_id
      - name: artist_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_artists')
              field: artist_id
      - name: track_name
        tests:
          - not_null
      - name: duration_ms
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 3600000
      - name: explicit_flag
        tests: 
          - not_null
          - accepted_values:
              values: [true, false]

  - name: stg_users
    columns: 
      - name: user_id   
        tests: 
          - not_null
          - unique
      
      - name: created_at
        tests:
          - not_null
      
      - name: email
        tests:
          - not_null
          - unique 
      
      - name: first_name
        tests: 
          - not_null 

      - name: last_name
        tests:
          - not_null
      
      - name: country_at_signup
        tests:
          - not_null
      
      - name: country_current
        tests:
          - not_null

      - name: acquisition_channel
        tests: 
          - not_null
          - accepted_values:
              values: ['referral', 'organic', 'paid_search', 'paid_social']

      - name: subscription_tier
        tests: 
          - not_null
          - accepted_values:
              values: ['free', 'premium']
      

  - name: stg_listening_events
    columns: 
      - name: event_id
        tests:
          - not_null
          - unique
        
      - name: user_id
        tests: 
          - not_null
          - relationships:
              to: ref('stg_users')
              field: user_id
      
      - name: track_id
        tests:
          - not_null
          - relationships: 
              to: ref('stg_tracks')
              field: track_id 
      
      - name: played_at
        tests: 
          - not_null
      
      - name: ms_played
        tests: 
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0

      - name: is_skipped
        tests:
          - not_null
          - accepted_values:
              values: [true, false]

      - name: device_type
        tests:
          - not_null
          - accepted_values:
              values: ['android', 'desktop', 'web', 'ios']

      - name: context
        tests:
          - not_null
      
      - name: session_id
        tests:
          - not_null